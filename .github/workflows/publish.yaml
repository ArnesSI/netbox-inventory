---
name: Publish Python package to PyPI

on:
  release:
    types:
      - created # runs on draft releases too

jobs:
  validate:
    name: Validate version strings match
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@main
      - name: Setup Python
        uses: actions/setup-python@main
        with:
          python-version: "3.12"
      - name: Check versions
        run: python scripts/version-check.py "${{ github.ref_name }}"

  publish:
    name: Publish to PyPI
    needs: validate
    if: github.repository == 'ArnesSI/netbox-inventory'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@main
      - name: Setup Python
        uses: actions/setup-python@main
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install 'build[virtualenv]'
      - name: Build package
        run: python -m build
      - name: Publish package
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true

  publish-release:
    name: Make release public
    needs: publish
    if: github.repository == 'ArnesSI/netbox-inventory'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ github.ref_name }}" --draft=false --repo "${{ github.repository }}"
